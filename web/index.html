<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>婚前辅导表单</title>
  <link rel="stylesheet" href="css/app.css" />
  <meta name="theme-color" content="#2f5d50" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1>婚前辅导 · 多表单</h1>
      <nav>
        <a href="index.html">全部表单</a>
      </nav>
    </div>
    <div class="note">
      数据仅保存在本机浏览器，可离线使用。手机浏览器可「添加到主屏幕」当 App 用；点选表单填写与对照，支持导入导出。
    </div>
    <div id="error" class="error" hidden></div>

    <div class="card">
      <div class="row">
        <button class="btn" id="btn-export" type="button">导出全部 JSON</button>
        <label class="btn" for="file-import">导入 JSON</label>
        <input id="file-import" type="file" accept="application/json,.json" hidden />
      </div>
      <p class="muted" style="margin-top:10px">
        导入会按文件覆盖对应表单答案。旧版单表导出仍可导入到「婚前关系评估」。
      </p>
    </div>

    <div id="form-list"></div>
  </div>
  <script src="js/pwa.js"></script>
  <script type="module" src="js/home.js"></script>
</body>
</html>
